<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="png" href="img/icon.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="css/world.css" />
  <title>SkyWatch — Explore</title>
</head>
<body>
  <div id="screen">

    <!-- Header -->
    <div class="section">
      <div class="date">Loading...</div>
      <div class="button"><i class="fa-solid fa-circle-plus btn-icon"></i></div>
    </div>

    <!-- Add City Panel -->
    <div class="section-box">
      <div class="add-section">
        <div class="add-section-title">
          <h2>Add a City</h2>
        </div>
        <div class="search">
          <div class="search-icon"><i class="fa-solid fa-location-dot"></i></div>
          <input class="searchinput" type="text" placeholder="Enter city name..." />
        </div>
        <div class="messages">
          <div class="error-message">City not found. Try again.</div>
          <div class="normal-message">Type a city name and press Enter</div>
          <div class="added-message">City added successfully ✔</div>
        </div>
      </div>
    </div>

    <!-- City Cards -->
    <div class="city-box"></div>

    <!-- Nav -->
    <nav>
      <ul>
        <li><a href="index.html"><i class="fa-solid fa-location-arrow"></i></a></li>
        <li><a href="search.html"><i class="fa-solid fa-magnifying-glass"></i></a></li>
        <li><a class="active" href="world.html"><i class="fa-solid fa-earth-americas"></i></a></li>
      </ul>
    </nav>
  </div>
  <script src="js/world.js"></script>
</body>
</html>
